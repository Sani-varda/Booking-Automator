version: '3.8'

services:
  backend:
    build: ./src/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-medspa_booking}
    ports:
      - "5432:5432"

  frontend:
    build: ./src/frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
